<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Recipe App - CI/CD Deployment</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f4f7fa;
}

header{
    background:#1f2937;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:80%;
    margin:40px auto;
}

.card{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
    color:#2563eb;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table td{
    padding:15px;
    border-bottom:1px solid #ddd;
}

.status{
    color:green;
    font-weight:bold;
}

footer{
    text-align:center;
    margin-top:40px;
    color:#777;
}
</style>

</head>

<body>

<header>

<h1>Recipe App CI/CD Pipeline</h1>

<p>Jenkins → GitHub → EC2 → Nginx</p>

</header>

<div class="container">

<div class="card">

<h2>Deployment Information</h2>

<table>

<tr>
<td><b>Project</b></td>
<td>Recipe Application</td>
</tr>

<tr>
<td><b>Repository</b></td>
<td>GitHub</td>
</tr>

<tr>
<td><b>Build Tool</b></td>
<td>Jenkins Pipeline</td>
</tr>

<tr>
<td><b>Deployment Target</b></td>
<td>Amazon EC2 + Nginx</td>
</tr>

<tr>
<td><b>Status</b></td>
<td class="status">Deployment Successful</td>
</tr>

<tr>
<td><b>Environment</b></td>
<td>Production</td>
</tr>

<tr>
<td><b>Last Deployment</b></td>
<td id="time"></td>
</tr>

</table>

</div>

</div>

<footer>

Powered by Jenkins CI/CD Pipeline

</footer>

<script>
document.getElementById("time").innerHTML =
new Date().toLocaleString();
</script>

</body>
</html>
