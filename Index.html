
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recipe Application</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
}

header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:20px;
    border-radius:10px;
}

#status{
    margin:20px 0;
    font-weight:bold;
    color:green;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.card h2{
    color:#3498db;
}

.card p{
    line-height:1.6;
}

.footer{
    margin-top:40px;
    text-align:center;
    color:#555;
}
</style>

</head>

<body>

<header>

<h1>AWS 3-Tier Recipe Application</h1>

<p>Frontend • Backend • MySQL Database</p>

</header>

<div id="status">
Loading recipes...
</div>

<div class="container" id="recipes"></div>

<div class="footer">

<p>Frontend : Nginx</p>

<p>Backend : Node.js + Express</p>

<p>Database : MySQL</p>

</div>

<script>

const API = "/api/recipes";

fetch(API)

.then(response=>response.json())

.then(data=>{

document.getElementById("status").innerHTML="Backend Connected Successfully";

const container=document.getElementById("recipes");

container.innerHTML="";

data.forEach(recipe=>{

container.innerHTML+=`

<div class="card">

<h2>${recipe.name}</h2>

<p><b>Ingredients</b></p>

<p>${recipe.ingredients}</p>

<p><b>Instructions</b></p>

<p>${recipe.instructions}</p>

<p><b>Created</b></p>

<p>${recipe.created_at}</p>

</div>

`;

});

})

.catch(error=>{

document.getElementById("status").innerHTML="Cannot connect to Backend";

console.log(error);

});

</script>

</body>

</html>
