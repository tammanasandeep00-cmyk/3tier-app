services:

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./Index.html:/usr/share/nginx/html/index.html

  backend:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - database

  database:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appdb
